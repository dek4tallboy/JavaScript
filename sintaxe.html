<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sintaxe JS</title>
</head>
<body>
<h1><b>JS é case sensitive, ou seja a sintaxe importa. Se eu colocar Var desta forma invés de var assim ele já não funciona</b></h1>  


<p>Exemplo Var, VAR, VaR, todas são variáveis, porém nenhuma delas funciona, porque a sintaxe correta no JavaScript é var nome da variável = valor da variável </p>
<script>

    var a = 5;
    var b = 6;
    var c = a+b;
    console.log(c);

</script>
</body>
</html>
