<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript</title>
    <style>
        body{
            background-color: black;
            color: aliceblue;
            text-align: center;
        }
    </style>
</head>
<body>
    <h2>Aprendendo as Declarações em JS</h2>
    <p>É assim que se declara uma variável em JS, o let é a variável, ou seja pode mudar de valor:</p>
    <p>let a,b,c;</p>
    <p>a=5,b=6,c=7;</p>

    <p>É assim que se declara uma variável em JS, o const é a constante, ou seja o valor é fixo:</p>
    <p>const = 3.14</p>
    <p id="constante"></p>
    <script>
        let a,b,c;
        a = 5;
        b = 6;
        c = 7;

        const nome = "André"
        console.log(nome)
    </script>

</body>
</html>
